<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d0d" />
  <meta name="description" content="Al Grano — crea eventos por voz, sin fricción" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Al Grano" />

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <title>Al Grano</title>
</head>
<body>

  <!-- ══════════════════════════════════════════
       CABECERA
  ══════════════════════════════════════════ -->
  <header class="app-header">
    <span class="app-logo">Al Grano</span>
    <button class="btn-icon" id="btnViewToggle" title="Ver eventos" aria-label="Ver eventos">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="9" y1="4" x2="9" y2="9"/>
        <line x1="15" y1="4" x2="15" y2="9"/>
      </svg>
    </button>
  </header>

  <!-- ══════════════════════════════════════════
       PANTALLA PRINCIPAL — BOTÓN VOZ
  ══════════════════════════════════════════ -->
  <main class="main-stage" id="mainStage">

    <!-- Estado de la app -->
    <div class="status-area" id="statusArea">
      <p class="status-label" id="statusLabel">Toca para hablar</p>
      <p class="transcript-text" id="transcriptText"></p>
    </div>

    <!-- Botón central de voz -->
    <div class="mic-wrapper">
      <button class="mic-btn" id="micBtn" aria-label="Activar micrófono">
        <div class="mic-rings">
          <div class="ring ring-1"></div>
          <div class="ring ring-2"></div>
          <div class="ring ring-3"></div>
        </div>
        <div class="mic-core">
          <!-- Icono micrófono -->
          <svg class="icon-mic" width="36" height="36" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="11" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="9" y1="22" x2="15" y2="22"/>
          </svg>
          <!-- Icono cargando (oculto por defecto) -->
          <svg class="icon-processing" width="36" height="36" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="9" stroke-dasharray="28 56" />
          </svg>
        </div>
      </button>
    </div>

    <!-- Fallback: entrada de texto -->
    <div class="text-fallback" id="textFallback">
      <input type="text" class="text-input" id="textInput"
             placeholder='Ej: "mañana médico a las 9"'
             autocomplete="off" autocorrect="off" spellcheck="false" />
      <button class="btn-text-send" id="btnTextSend" aria-label="Enviar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

    <!-- Tarjeta de confirmación -->
    <div class="confirm-card" id="confirmCard" hidden>
      <div class="confirm-event-preview" id="confirmPreview"></div>
      <div class="confirm-actions">
        <button class="btn-confirm" id="btnYes">✓ Sí, guardar</button>
        <button class="btn-cancel-event" id="btnNo">✗ Cancelar</button>
      </div>
      <p class="confirm-hint">O di "sí" / "no" / "cancelar"</p>
    </div>

  </main>

  <!-- ══════════════════════════════════════════
       PANEL DE EVENTOS (slide-up)
  ══════════════════════════════════════════ -->
  <section class="events-panel" id="eventsPanel" aria-hidden="true">
    <div class="panel-handle"></div>
    <div class="panel-header">
      <h2 class="panel-title">Mis eventos</h2>
      <button class="btn-icon" id="btnClosePanel" aria-label="Cerrar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Filtro de días -->
    <div class="day-tabs" id="dayTabs" role="tablist">
      <button class="day-tab active" data-day="hoy" role="tab">Hoy</button>
      <button class="day-tab" data-day="mañana" role="tab">Mañana</button>
      <button class="day-tab" data-day="semana" role="tab">Esta semana</button>
      <button class="day-tab" data-day="pendientes" role="tab">Pendientes</button>
    </div>

    <div class="events-list" id="eventsList">
      <p class="empty-state">No hay eventos aún.<br>Pulsa el micrófono y habla.</p>
    </div>
  </section>

  <!-- ══════════════════════════════════════════
       TOAST NOTIFICATIONS
  ══════════════════════════════════════════ -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <!-- ══════════════════════════════════════════
       OVERLAY FONDO (para panel)
  ══════════════════════════════════════════ -->
  <div class="overlay" id="overlay"></div>

  <script src="app.js"></script>
</body>
</html>
